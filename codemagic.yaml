workflows:
  android-debug-build:
    name: Build Android Debug APK
    max_build_duration: 60
    instance_type: linux
    environment:
      node: 20
      java: 17
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Android Debug APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace --info
    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk
